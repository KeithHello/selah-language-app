<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1080px; height: 1080px; overflow: hidden; background: #FBF8F4; font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }
      .stage { width: 1080px; height: 1080px; display: flex; align-items: center; justify-content: center; position: relative; }
      .seed-wrapper { position: relative; width: 440px; height: 500px; display: flex; align-items: center; justify-content: center; }
      .seed-shadow { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); width: 240px; height: 28px; background: radial-gradient(ellipse, rgba(26,22,20,0.08) 0%, transparent 70%); border-radius: 50%; }
      .label { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); text-align: center; white-space: nowrap; }
      .label-main { font-size: 28px; font-weight: 800; color: #1A1614; letter-spacing: -0.03em; }
      .label-sub { font-size: 16px; color: #706B65; margin-top: 4px; }
      .label-tag { display: inline-block; padding: 4px 14px; border-radius: 999px; background: #FEF0ED; color: #E06B54; font-size: 13px; font-weight: 700; margin-top: 8px; }
      
      /* Petal particles */
      .petal-particle { position: absolute; width: 12px; height: 12px; background: #E06B54; border-radius: 50%; opacity: 0; }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="5" data-width="1080" data-height="1080">
      <div class="stage">
        <div class="seed-wrapper" id="seed-wrapper">
          <div class="seed-shadow" id="seed-shadow"></div>
          
          <!-- Petal particles -->
          <div class="petal-particle" id="p1" style="top:60px;left:120px"></div>
          <div class="petal-particle" id="p2" style="top:80px;left:280px"></div>
          <div class="petal-particle" id="p3" style="top:40px;left:200px"></div>
          <div class="petal-particle" id="p4" style="top:100px;left:160px"></div>
          <div class="petal-particle" id="p5" style="top:50px;left:320px"></div>
          <div class="petal-particle" id="p6" style="top:90px;left:100px"></div>
          
          <svg id="seed-svg" width="320" height="400" viewBox="0 0 320 400" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <radialGradient id="bG" cx="0.4" cy="0.35" r="0.65">
                <stop offset="0%" stop-color="#F5D89A"/>
                <stop offset="60%" stop-color="#E5A244"/>
                <stop offset="100%" stop-color="#C48530"/>
              </radialGradient>
              <radialGradient id="lG" cx="0.3" cy="0.3" r="0.7">
                <stop offset="0%" stop-color="#7BC4A0"/>
                <stop offset="100%" stop-color="#5A9E82"/>
              </radialGradient>
              <radialGradient id="flG" cx="0.4" cy="0.3" r="0.6">
                <stop offset="0%" stop-color="#F0927A"/>
                <stop offset="60%" stop-color="#E06B54"/>
                <stop offset="100%" stop-color="#C85540"/>
              </radialGradient>
              <radialGradient id="flCenter" cx="0.45" cy="0.4" r="0.5">
                <stop offset="0%" stop-color="#FFD4BC"/>
                <stop offset="100%" stop-color="#F0A890"/>
              </radialGradient>
              <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
                <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="rgba(229,162,68,0.15)"/>
              </filter>
              <filter id="flGlow" x="-30%" y="-30%" width="160%" height="160%">
                <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="rgba(224,107,84,0.3)"/>
              </filter>
            </defs>
            
            <!-- Leaves (two) -->
            <g id="leaves-group">
              <g id="leaf-l" transform="translate(60, 120)">
                <ellipse cx="0" cy="0" rx="35" ry="18" fill="url(#lG)" transform="rotate(-35)"/>
                <path d="M-25 -6 Q0 2 20 8" stroke="#4A8E72" stroke-width="1.5" fill="none" opacity="0.4"/>
              </g>
              <g id="leaf-r" transform="translate(260, 120)">
                <ellipse cx="0" cy="0" rx="35" ry="18" fill="url(#lG)" transform="rotate(35)"/>
                <path d="M25 -6 Q0 2 -20 8" stroke="#4A8E72" stroke-width="1.5" fill="none" opacity="0.4"/>
              </g>
            </g>
            
            <!-- Flower -->
            <g id="flower-group" transform="translate(160, 50)">
              <!-- Petals -->
              <g id="petals" filter="url(#flGlow)">
                <ellipse cx="0" cy="-22" rx="16" ry="20" fill="url(#flG)" opacity="0.85"/>
                <ellipse cx="20" cy="-8" rx="16" ry="20" fill="url(#flG)" opacity="0.8" transform="rotate(72, 20, -8)"/>
                <ellipse cx="14" cy="18" rx="16" ry="20" fill="url(#flG)" opacity="0.75" transform="rotate(144, 14, 18)"/>
                <ellipse cx="-14" cy="18" rx="16" ry="20" fill="url(#flG)" opacity="0.8" transform="rotate(216, -14, 18)"/>
                <ellipse cx="-20" cy="-8" rx="16" ry="20" fill="url(#flG)" opacity="0.85" transform="rotate(288, -20, -8)"/>
              </g>
              <!-- Center -->
              <circle cx="0" cy="0" r="12" fill="url(#flCenter)"/>
              <circle cx="-3" cy="-3" r="3" fill="rgba(255,255,255,0.3)"/>
            </g>
            
            <!-- Stem connecting flower to seed -->
            <path id="stem" d="M160 75 Q158 100 160 130" stroke="#5A9E82" stroke-width="6" fill="none" stroke-linecap="round"/>
            
            <!-- Body -->
            <ellipse id="body" cx="160" cy="238" rx="108" ry="102" fill="url(#bG)" filter="url(#sh)"/>
            <ellipse cx="136" cy="208" rx="62" ry="52" fill="rgba(255,255,255,0.1)"/>
            
            <!-- Eyes -->
            <g id="eyes">
              <ellipse cx="130" cy="230" rx="9" ry="10" fill="#1A1614"/>
              <ellipse cx="190" cy="230" rx="9" ry="10" fill="#1A1614"/>
              <circle cx="134" cy="226" r="3.5" fill="white" opacity="0.9"/>
              <circle cx="194" cy="226" r="3.5" fill="white" opacity="0.9"/>
            </g>
            <g id="eyelids" opacity="0">
              <ellipse cx="130" cy="230" rx="11" ry="11" fill="#C48530"/>
              <ellipse cx="190" cy="230" rx="11" ry="11" fill="#C48530"/>
            </g>
            
            <!-- Blush (bigger for bloom stage) -->
            <ellipse cx="98" cy="258" rx="18" ry="10" fill="#E06B54" opacity="0.2"/>
            <ellipse cx="222" cy="258" rx="18" ry="10" fill="#E06B54" opacity="0.2"/>
            
            <!-- Happy smile (bigger) -->
            <path id="smile" d="M142 264 Q160 280 178 264" stroke="#8B6914" stroke-width="3.5" fill="none" stroke-linecap="round"/>
            
            <!-- Arms -->
            <ellipse cx="60" cy="260" rx="22" ry="14" fill="#D4953A" transform="rotate(-15, 60, 260)"/>
            <ellipse cx="260" cy="260" rx="22" ry="14" fill="#D4953A" transform="rotate(15, 260, 260)"/>
          </svg>
        </div>
        
        <div class="label" id="label">
          <div class="label-main">quiz-flower-bloom</div>
          <div class="label-sub">S4-ACT-07 · Stage 4 開花</div>
          <div class="label-tag">🎯 action · P0 必須實現</div>
        </div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      
      // Entrance
      tl.from("#seed-wrapper", { scale: 0.7, opacity: 0, duration: 0.8, ease: "back.out(1.7)" }, 0.1);
      tl.from("#label", { y: 30, opacity: 0, duration: 0.5, ease: "power2.out" }, 0.4);
      
      // Gentle idle sway with flower
      tl.to("#seed-svg", { rotation: 3, duration: 1.5, ease: "sine.inOut" }, 0.8);
      
      // === QUIZ CORRECT: celebration! ===
      
      // Flower blooms bigger
      tl.to("#petals", { scale: 1.3, duration: 0.5, ease: "back.out(2)", transformOrigin: "center center" }, 1.8);
      tl.to("#petals", { scale: 1.0, duration: 0.4, ease: "power2.out" }, 2.3);
      
      // Seed jumps!
      tl.to("#seed-wrapper", { y: -30, duration: 0.3, ease: "power2.out" }, 1.8);
      tl.to("#seed-wrapper", { y: 0, duration: 0.4, ease: "bounce.out" }, 2.1);
      tl.to("#seed-wrapper", { y: -15, duration: 0.25, ease: "power2.out" }, 2.5);
      tl.to("#seed-wrapper", { y: 0, duration: 0.35, ease: "bounce.out" }, 2.75);
      
      // Petal particles scatter
      tl.to("#p1", { opacity: 0.8, y: -40, x: -30, rotation: 45, duration: 0.6, ease: "power2.out" }, 1.9);
      tl.to("#p2", { opacity: 0.7, y: -50, x: 25, rotation: -30, duration: 0.6, ease: "power2.out" }, 1.95);
      tl.to("#p3", { opacity: 0.9, y: -60, x: 10, rotation: 60, duration: 0.7, ease: "power2.out" }, 1.85);
      tl.to("#p4", { opacity: 0.6, y: -35, x: -20, rotation: -45, duration: 0.5, ease: "power2.out" }, 2.0);
      tl.to("#p5", { opacity: 0.8, y: -45, x: 35, rotation: 30, duration: 0.6, ease: "power2.out" }, 1.92);
      tl.to("#p6", { opacity: 0.7, y: -55, x: -15, rotation: -60, duration: 0.7, ease: "power2.out" }, 1.88);
      
      // Petals fade out
      tl.to(".petal-particle", { opacity: 0, y: "+=30", duration: 0.8, ease: "power2.in" }, 2.8);
      
      // Leaves wave happily
      tl.to("#leaf-l", { rotation: -50, duration: 0.3, ease: "sine.inOut", yoyo: true, repeat: 3, transformOrigin: "right center" }, 1.8);
      tl.to("#leaf-r", { rotation: 50, duration: 0.3, ease: "sine.inOut", yoyo: true, repeat: 3, transformOrigin: "left center" }, 1.8);
      
      // Flower rotation
      tl.to("#flower-group", { rotation: 15, duration: 0.8, ease: "sine.inOut", yoyo: true, repeat: 1, transformOrigin: "center bottom" }, 1.8);
      
      // Blink
      tl.to("#eyelids", { opacity: 1, duration: 0.08 }, 3.5);
      tl.to("#eyelids", { opacity: 0, duration: 0.08 }, 3.65);
      
      // Settle down
      tl.to("#seed-svg", { rotation: 0, duration: 0.6, ease: "power2.inOut" }, 4.0);
      tl.to("#petals", { scale: 1.0, duration: 0.5, ease: "sine.out" }, 4.0);
      
      // Shadow responds
      tl.to("#seed-shadow", { scaleX: 0.7, opacity: 0.4, duration: 0.3, ease: "power2.out" }, 1.8);
      tl.to("#seed-shadow", { scaleX: 1, opacity: 1, duration: 0.4, ease: "bounce.out" }, 2.1);
      
      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
