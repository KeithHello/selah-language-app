<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1080px; height: 1080px; overflow: hidden;
        background: #FBF8F4;
        font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      }
      .stage {
        width: 1080px; height: 1080px;
        display: flex; align-items: center; justify-content: center;
        position: relative;
      }
      .seed-wrapper {
        position: relative;
        width: 400px; height: 400px;
        display: flex; align-items: center; justify-content: center;
      }
      .seed-shadow {
        position: absolute;
        bottom: 40px; left: 50%; transform: translateX(-50%);
        width: 200px; height: 24px;
        background: radial-gradient(ellipse, rgba(26,22,20,0.08) 0%, transparent 70%);
        border-radius: 50%;
      }
      .label {
        position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
        text-align: center; white-space: nowrap;
      }
      .label-main {
        font-size: 28px; font-weight: 800; color: #1A1614; letter-spacing: -0.03em;
      }
      .label-sub {
        font-size: 16px; color: #706B65; margin-top: 4px;
      }
      .label-tag {
        display: inline-block; padding: 4px 14px; border-radius: 999px;
        background: #ECF7F1; color: #5A9E82; font-size: 13px; font-weight: 700;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="5" data-width="1080" data-height="1080">
      <div class="stage">
        <div class="seed-wrapper" id="seed-wrapper">
          <!-- Shadow -->
          <div class="seed-shadow" id="seed-shadow"></div>
          
          <!-- Seed SVG -->
          <svg id="seed-svg" width="260" height="260" viewBox="0 0 260 260" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Main body -->
            <defs>
              <radialGradient id="bodyGrad" cx="0.4" cy="0.35" r="0.65">
                <stop offset="0%" stop-color="#F5D89A"/>
                <stop offset="60%" stop-color="#E5A244"/>
                <stop offset="100%" stop-color="#C48530"/>
              </radialGradient>
              <radialGradient id="highlight" cx="0.35" cy="0.3" r="0.4">
                <stop offset="0%" stop-color="rgba(255,255,255,0.3)"/>
                <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
              </radialGradient>
              <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
                <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="rgba(229,162,68,0.15)"/>
              </filter>
            </defs>
            
            <!-- Body -->
            <ellipse id="seed-body" cx="130" cy="138" rx="95" ry="90" fill="url(#bodyGrad)" filter="url(#softShadow)"/>
            <!-- Highlight -->
            <ellipse cx="110" cy="115" rx="55" ry="45" fill="url(#highlight)"/>
            
            <!-- Top crack/line -->
            <path d="M120 52 Q130 60 130 75 Q130 60 140 52" stroke="#C48530" stroke-width="2.5" fill="none" stroke-linecap="round"/>
            
            <!-- Eyes -->
            <g id="eyes">
              <ellipse id="eye-l" cx="105" cy="132" rx="7" ry="8" fill="#1A1614"/>
              <ellipse id="eye-r" cx="155" cy="132" rx="7" ry="8" fill="#1A1614"/>
              <!-- Eye highlights -->
              <circle cx="108" cy="129" r="2.5" fill="white" opacity="0.9"/>
              <circle cx="158" cy="129" r="2.5" fill="white" opacity="0.9"/>
            </g>
            
            <!-- Blink eyelids (hidden by default) -->
            <g id="eyelids" opacity="0">
              <ellipse cx="105" cy="132" rx="9" ry="9" fill="#C48530"/>
              <ellipse cx="155" cy="132" rx="9" ry="9" fill="#C48530"/>
              <path d="M96 132 Q105 136 114 132" stroke="#A07020" stroke-width="1.5" fill="none" stroke-linecap="round"/>
              <path d="M146 132 Q155 136 164 132" stroke="#A07020" stroke-width="1.5" fill="none" stroke-linecap="round"/>
            </g>
            
            <!-- Blush -->
            <ellipse cx="82" cy="152" rx="14" ry="8" fill="#E06B54" opacity="0.15"/>
            <ellipse cx="178" cy="152" rx="14" ry="8" fill="#E06B54" opacity="0.15"/>
            
            <!-- Smile -->
            <path id="smile" d="M118 158 Q130 168 142 158" stroke="#8B6914" stroke-width="3" fill="none" stroke-linecap="round"/>
            
            <!-- Tiny arms -->
            <g id="arms">
              <ellipse cx="45" cy="155" rx="18" ry="12" fill="#D4953A" transform="rotate(-15, 45, 155)"/>
              <ellipse cx="215" cy="155" rx="18" ry="12" fill="#D4953A" transform="rotate(15, 215, 155)"/>
            </g>
          </svg>
        </div>
        
        <!-- Label -->
        <div class="label" id="label">
          <div class="label-main" id="label-main">gentle-float</div>
          <div class="label-sub">S1-IDLE-01 · Stage 1 種子</div>
          <div class="label-tag">💤 idle · P0 必須實現</div>
        </div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      
      // Entrance
      tl.from("#seed-wrapper", { scale: 0.7, opacity: 0, duration: 0.8, ease: "back.out(1.7)" }, 0.1);
      tl.from("#label", { y: 30, opacity: 0, duration: 0.5, ease: "power2.out" }, 0.4);
      
      // Gentle float (main animation - 3 cycles in 5s)
      tl.to("#seed-wrapper", { y: -20, duration: 1.2, ease: "sine.inOut", yoyo: true, repeat: 3 }, 0.8);
      
      // Shadow responds to float
      tl.to("#seed-shadow", { scaleX: 0.85, opacity: 0.6, duration: 1.2, ease: "sine.inOut", yoyo: true, repeat: 3 }, 0.8);
      
      // Subtle body tilt during float
      tl.to("#seed-svg", { rotation: 2, duration: 1.2, ease: "sine.inOut", yoyo: true, repeat: 3 }, 0.8);
      
      // Blink at 2.5s
      tl.to("#eyelids", { opacity: 1, duration: 0.08 }, 2.4);
      tl.to("#eyelids", { opacity: 0, duration: 0.08 }, 2.55);
      
      // Blink at 4.2s
      tl.to("#eyelids", { opacity: 1, duration: 0.08 }, 4.1);
      tl.to("#eyelids", { opacity: 0, duration: 0.08 }, 4.25);
      
      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
