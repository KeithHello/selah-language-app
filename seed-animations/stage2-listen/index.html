<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1080px; height: 1080px; overflow: hidden; background: #FBF8F4; font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }
      .stage { width: 1080px; height: 1080px; display: flex; align-items: center; justify-content: center; position: relative; }
      .seed-wrapper { position: relative; width: 400px; height: 460px; display: flex; align-items: center; justify-content: center; }
      .seed-shadow { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 210px; height: 24px; background: radial-gradient(ellipse, rgba(26,22,20,0.08) 0%, transparent 70%); border-radius: 50%; }
      .label { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); text-align: center; white-space: nowrap; }
      .label-main { font-size: 28px; font-weight: 800; color: #1A1614; letter-spacing: -0.03em; }
      .label-sub { font-size: 16px; color: #706B65; margin-top: 4px; }
      .label-tag { display: inline-block; padding: 4px 14px; border-radius: 999px; background: #F0EEF8; color: #8B7FC7; font-size: 13px; font-weight: 700; margin-top: 8px; }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="5" data-width="1080" data-height="1080">
      <div class="stage">
        <div class="seed-wrapper" id="seed-wrapper">
          <div class="seed-shadow" id="seed-shadow"></div>
          
          <svg id="seed-svg" width="280" height="340" viewBox="0 0 280 340" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <radialGradient id="bodyG" cx="0.4" cy="0.35" r="0.65">
                <stop offset="0%" stop-color="#F5D89A"/>
                <stop offset="60%" stop-color="#E5A244"/>
                <stop offset="100%" stop-color="#C48530"/>
              </radialGradient>
              <radialGradient id="leafG" cx="0.3" cy="0.3" r="0.7">
                <stop offset="0%" stop-color="#7BC4A0"/>
                <stop offset="100%" stop-color="#5A9E82"/>
              </radialGradient>
              <filter id="shd" x="-20%" y="-20%" width="140%" height="140%">
                <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="rgba(229,162,68,0.15)"/>
              </filter>
            </defs>
            
            <!-- Sprout -->
            <g id="sprout-group" transform="translate(140, 65)">
              <path id="stem" d="M0 0 Q-2 -25 0 -50" stroke="#5A9E82" stroke-width="5" fill="none" stroke-linecap="round"/>
              <g id="leaf" transform="translate(0, -52)">
                <ellipse cx="-14" cy="0" rx="22" ry="12" fill="url(#leafG)" transform="rotate(-20)"/>
                <path d="M-28 -4 Q-14 2 0 6" stroke="#4A8E72" stroke-width="1.5" fill="none" opacity="0.5" stroke-linecap="round"/>
              </g>
            </g>
            
            <!-- Body -->
            <ellipse id="body" cx="140" cy="188" rx="100" ry="95" fill="url(#bodyG)" filter="url(#shd)"/>
            <ellipse cx="118" cy="162" rx="58" ry="48" fill="rgba(255,255,255,0.12)"/>
            
            <!-- Crack -->
            <path d="M128 97 Q140 105 140 120 Q140 105 152 97" stroke="#C48530" stroke-width="2.5" fill="none" stroke-linecap="round"/>
            
            <!-- Eyes -->
            <g id="eyes">
              <ellipse cx="112" cy="182" rx="8" ry="9" fill="#1A1614"/>
              <ellipse cx="168" cy="182" rx="8" ry="9" fill="#1A1614"/>
              <circle cx="115" cy="178" r="3" fill="white" opacity="0.9"/>
              <circle cx="171" cy="178" r="3" fill="white" opacity="0.9"/>
            </g>
            <g id="eyelids" opacity="0">
              <ellipse cx="112" cy="182" rx="10" ry="10" fill="#C48530"/>
              <ellipse cx="168" cy="182" rx="10" ry="10" fill="#C48530"/>
            </g>
            
            <!-- Blush -->
            <ellipse cx="86" cy="205" rx="16" ry="9" fill="#E06B54" opacity="0.15"/>
            <ellipse cx="194" cy="205" rx="16" ry="9" fill="#E06B54" opacity="0.15"/>
            
            <!-- Smile -->
            <path id="smile" d="M126 210 Q140 222 154 210" stroke="#8B6914" stroke-width="3" fill="none" stroke-linecap="round"/>
            
            <!-- Arms -->
            <ellipse cx="48" cy="208" rx="20" ry="13" fill="#D4953A" transform="rotate(-15, 48, 208)"/>
            <ellipse cx="232" cy="208" rx="20" ry="13" fill="#D4953A" transform="rotate(15, 232, 208)"/>
          </svg>
        </div>
        
        <div class="label" id="label">
          <div class="label-main">listen-leaf-up</div>
          <div class="label-sub">S2-ACT-01 · Stage 2 發芽</div>
          <div class="label-tag">🎯 action · P0 必須實現</div>
        </div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      
      // Entrance
      tl.from("#seed-wrapper", { scale: 0.7, opacity: 0, duration: 0.8, ease: "back.out(1.7)" }, 0.1);
      tl.from("#label", { y: 30, opacity: 0, duration: 0.5, ease: "power2.out" }, 0.4);
      
      // Idle float
      tl.to("#seed-wrapper", { y: -8, duration: 1.5, ease: "sine.inOut", yoyo: true, repeat: 2 }, 0.8);
      
      // Seed tilts to listen
      tl.to("#seed-svg", { rotation: 14, duration: 0.7, ease: "power2.out" }, 1.0);
      
      // Leaf perks up (ear-like)
      tl.to("#leaf", { rotation: -30, scaleY: 1.2, duration: 0.6, ease: "back.out(2.5)", transformOrigin: "100% 100%" }, 1.2);
      tl.to("#leaf", { rotation: -15, duration: 0.8, ease: "sine.inOut", yoyo: true, repeat: 2, transformOrigin: "100% 100%" }, 1.8);
      
      // Subtle body vibrate (feeling sound)
      tl.to("#body", { scaleX: 1.02, scaleY: 0.98, duration: 0.15, ease: "sine.inOut", yoyo: true, repeat: 5, transformOrigin: "center center" }, 2.0);
      
      // Blink
      tl.to("#eyelids", { opacity: 1, duration: 0.08 }, 2.8);
      tl.to("#eyelids", { opacity: 0, duration: 0.08 }, 2.95);
      
      // Return to normal
      tl.to("#seed-svg", { rotation: 0, duration: 0.6, ease: "power2.inOut" }, 4.0);
      tl.to("#leaf", { rotation: 0, scaleY: 1, duration: 0.5, ease: "power2.inOut", transformOrigin: "100% 100%" }, 4.0);
      
      // Shadow
      tl.to("#seed-shadow", { x: 8, scaleX: 0.92, duration: 0.7, ease: "power2.out" }, 1.0);
      tl.to("#seed-shadow", { x: 0, scaleX: 1, duration: 0.6, ease: "power2.inOut" }, 4.0);
      
      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
