name: Build & Test

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Selah (macOS)
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show environment
        run: |
          swift --version
          echo "--- Source files ---"
          find Selah -name "*.swift" | sort

      - name: Resolve and build
        run: |
          swift package resolve 2>&1
          swift build 2>&1
