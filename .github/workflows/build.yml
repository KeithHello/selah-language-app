name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Selah (macOS)
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Show Swift version
        run: swift --version

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve package dependencies
        run: swift package resolve

      - name: Build
        run: swift build -v

      - name: Test
        run: swift test -v
