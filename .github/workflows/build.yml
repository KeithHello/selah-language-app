name: Build & Test

on:
  push:
    branches:
      - main
      - codex/complete-non-animation-systems
  workflow_dispatch:

jobs:
  swift:
    name: Swift Package
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show environment
        run: |
          swift --version
          echo "--- Source files ---"
          find Selah -name "*.swift" | sort

      - name: Resolve, build, and test
        run: |
          swift package resolve 2>&1
          swift build 2>&1
          swift test 2>&1

  deno:
    name: Supabase Deno Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: lts
          cache: true

      - name: Check formatting
        run: deno fmt --check supabase/functions supabase/tests supabase/scripts

      - name: Run tests
        run: deno test --allow-read supabase/tests
