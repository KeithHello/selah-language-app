name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Selah (macOS)
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show available Xcode versions
        run: ls -d /Applications/Xcode*.app 2>/dev/null || echo "No Xcode bundles found"

      - name: Show Swift version
        run: swift --version

      - name: Show Xcode version
        run: xcodebuild -version 2>/dev/null || echo "xcodebuild not available"

      - name: Resolve package dependencies
        run: swift package resolve

      - name: Build
        run: swift build -v 2>&1

      - name: Test
        run: swift test -v 2>&1
